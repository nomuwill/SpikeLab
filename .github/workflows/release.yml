name: Publish to PyPI

# Trusted publishing via PyPI's OpenID Connect (OIDC) flow. No API token
# is stored in the repository; PyPI verifies the GitHub-issued OIDC token
# against the trusted-publisher configuration on the project. See
# https://docs.pypi.org/trusted-publishers/ for the PyPI-side setup
# (project name: spikelab; owner: braingeneers; repo: SpikeLab;
# workflow filename: release.yml; environment: pypi).

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Verify tag matches pyproject version
        # Belt-and-braces guard: refuse to build if the pushed tag does
        # not match ``[project] version`` in pyproject.toml. Catches the
        # common mistake of tagging a release without bumping the version
        # (or vice versa) — far cheaper to fail here than to publish a
        # mismatched wheel to PyPI, which is immutable.
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "::error::Tag version '$TAG_VERSION' does not match pyproject.toml version '$PROJECT_VERSION'"
            exit 1
          fi

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        # ``twine check`` validates that the long_description renders as
        # the README content type declares (RST/Markdown) and that the
        # metadata required by PyPI is present. Failing here means PyPI
        # would reject the upload — better to find out in this job than
        # after the publish step starts.
        run: |
          pip install twine
          twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Pinning to the ``pypi`` environment lets the repo admin add
    # required-reviewer / branch-restriction protection rules without
    # touching this workflow file. See
    # https://docs.github.com/en/actions/deployment/targeting-different-environments/using-environments-for-deployment
    environment:
      name: pypi
      url: https://pypi.org/p/spikelab
    permissions:
      # ``id-token: write`` is the OIDC permission that lets the workflow
      # mint a short-lived JWT PyPI can verify. Without it, the publish
      # action falls back to looking for an API token and fails.
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI via trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
